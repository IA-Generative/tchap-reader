# tchapreader — Feature service
#
# Mode modulaire (socle lancé séparément) :
#   docker compose up -d                         → tchapreader uniquement
#
# Mode legacy (ancien réseau grafrag-experimentation_default) :
#   docker compose --profile legacy up -d

services:
  tchapreader:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8087:8087"
    env_file:
      - .env
    volumes:
      - tchap-data:/app/data
    restart: unless-stopped
    networks:
      - owui-net

  # Legacy: si besoin de rejoindre l'ancien réseau monorepo
  tchapreader-legacy:
    profiles: ["legacy"]
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8087:8087"
    env_file:
      - .env
    volumes:
      - tchap-data:/app/data
    restart: unless-stopped
    networks:
      - grafrag

networks:
  owui-net:
    external: true
  grafrag:
    external: true
    name: grafrag-experimentation_default

volumes:
  tchap-data:
