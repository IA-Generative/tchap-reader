apiVersion: apps/v1
kind: Deployment
metadata:
  name: tchapreader
  namespace: grafrag
  labels:
    app: tchapreader
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tchapreader
  template:
    metadata:
      labels:
        app: tchapreader
    spec:
      imagePullSecrets:
        - name: grafrag-registry
      containers:
        - name: tchapreader
          image: ${REGISTRY}/tchapreader:${IMAGE_TAG}
          ports:
            - containerPort: 8087
          envFrom:
            - secretRef:
                name: grafrag-secrets
            - configMapRef:
                name: tchapreader-config
          volumeMounts:
            - name: data
              mountPath: /app/data
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8087
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8087
            initialDelaySeconds: 10
            periodSeconds: 30
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: tchapreader-data
